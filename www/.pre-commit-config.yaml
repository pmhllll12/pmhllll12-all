# www는 서브모듈(별도 저장소)이라 이 파일이 여기 있어야 `git commit`(www 안에서)에
# 실제로 걸린다. 근거: eslint.config.mjs, .prettierrc.json
#
# 설치 (www/ 안에서, 최초 1회):
#   npm install
#   pip install pre-commit
#   pre-commit install

repos:
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npx eslint --config eslint.config.mjs
        language: system
        files: ^src/.*\.(ts|tsx|js|jsx)$

      - id: prettier
        name: prettier --check
        entry: npx prettier --check
        language: system
        files: ^src/.*\.(ts|tsx|js|jsx|css)$
