name: lint

# www는 서브모듈(별도 저장소 cloud.pmhllll12.www)이라 이 파일이 여기 있어야 PR에서 실제로 돈다.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  eslint-prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci
      - run: npx eslint .
      - run: npx prettier --check .
