# 프론트엔드(www)는 docker 배포 대상이 아님. backend는 http://localhost:8000 으로 직접 접근
services:
  backend:
    build:
      context: ./minho
    ports:
      - "8000:8000"
    expose:
      - "8000"
    env_file:
      - ./minho/.env
    environment:
      API_HOST: "0.0.0.0"
      UVICORN_RELOAD: "0"
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@pgvector:5432/${POSTGRES_DB:-neondb}?sslmode=disable
      OLLAMA_HOST: http://host.docker.internal:11434
      N8N_COMMUNITY_EMAIL_WEBHOOK_URL: http://n8n:5678/webhook/community-email
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - pgvector
      - neo4j
      - redis
    restart: always

  n8n:
    image: docker.n8n.io/n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      N8N_WEBHOOK_URL: https://n8n.pmhllll12.cloud
    volumes:
      - n8n_data:/home/node/.n8n
    restart: always

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    restart: always

  pgvector:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-neondb}
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    restart: always

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - pgvector
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - n8n
      - backend
    restart: always

volumes:
  n8n_data:
  neo4j_data:
  pgvector_data:
  redis_data:
