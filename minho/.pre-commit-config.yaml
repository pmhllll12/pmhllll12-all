# minho는 서브모듈(별도 저장소)이라 이 파일이 여기 있어야 `git commit`(minho 안에서)에
# 실제로 걸린다. 근거: pyproject.toml, _docs/architecture-star-topology.md
#
# 설치 (minho/ 안에서, 최초 1회):
#   pip install -r requirements-dev.txt pre-commit
#   pre-commit install

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check .
        language: system
        files: \.py$
        pass_filenames: false

      - id: ruff-format
        name: ruff format --check
        entry: ruff format --check .
        language: system
        files: \.py$
        pass_filenames: false

      - id: architecture
        name: import-linter (star topology / ontology / clean architecture)
        entry: bash scripts/check_architecture.sh
        language: system
        files: \.py$
        pass_filenames: false
