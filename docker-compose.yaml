# 브라우저는 http://localhost:3000 만 사용 (gateway → backend / frontend)
services:
  backend:
    build:
      context: ./minho
    ports:
      - "8000:8000"
    expose:
      - "8000"
    env_file:
      - ./minho/.env
    environment:
      API_HOST: "0.0.0.0"
      UVICORN_RELOAD: "0"
    restart: always

  # Next.js (next start) — 호스트 포트 없음. 컨테이너 내부 0.0.0.0:3000 리슨
  frontend:
    build:
      context: ./www
    expose:
      - "3000"
    env_file:
      - path: ./www/.env.local
        required: false
    restart: always
    depends_on:
      - backend

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "3000:80"
    volumes:
      - ./docker/gateway.default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

  n8n:
    image: docker.n8n.io/n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: always

volumes:
  n8n_data:
