# gateway: browser :3000 -> nginx -> backend / frontend
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream backend_upstream {
    server backend:8000;
}

server {
    listen 80;
    server_name _;
    # Compose 내장 DNS — upstream 호스트명을 요청 시마다 다시 조회 (컨테이너 기동 순서 이슈 완화)
    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 100m;

    proxy_connect_timeout 120s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # /api/... -> backend /... (strip /api prefix)
    location /api/ {
        proxy_pass http://backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_request_buffering off;
    }

    location ^~ /titanic/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_request_buffering off;
    }

    location = /titanic {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_request_buffering off;
    }

    location = /chat {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_request_buffering off;
    }

    location ^~ /weather {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_request_buffering off;
    }

    location = /signup {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_request_buffering off;
    }

    location = /ping {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_request_buffering off;
    }

    location ^~ /db-check {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_request_buffering off;
    }

    location ^~ /neon-status {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_request_buffering off;
    }

    location ^~ /doro/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_request_buffering off;
    }

    location ^~ /google-gemini {
        rewrite ^/google-gemini/?(.*)$ /$1 break;
        proxy_pass https://generativelanguage.googleapis.com;
        proxy_ssl_server_name on;
        proxy_set_header Host generativelanguage.googleapis.com;
    }

    location / {
        set $fe http://frontend:3000;
        proxy_pass $fe;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
